<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recorder UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #EDF4FF 0%, #F5F9FF 100%);
            --primary-blue: #1A5CFF;
            --text-dark: #0A1931;
            --text-muted: #6B7C96;
            
            /* 3D Button Colors */
            --btn-pause-bg: #FFB300;
            --btn-pause-shadow: #D48800;
            --btn-stop-bg: #FF3B30;
            --btn-stop-shadow: #C61A11;
            --btn-cancel-bg: #F0F4FA;
            --btn-cancel-shadow: #D2DCEB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0c1017;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Smartphone Container Frame */
        .phone-container {
            width: 390px;
            height: 844px;
            background: var(--bg-gradient);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #222;
        }

        /* Top Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* Header Navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-dark);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }

        /* Live Recording Tag */
        .recording-tag-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .recording-tag {
            background: rgba(255, 59, 48, 0.1);
            color: #FF3B30;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .recording-tag::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #FF3B30;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* Main Visualizer Area */
        .visualizer-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Abstract Floating Elements (Microphone, AI, etc.) */
        .floating-icon {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(173, 195, 225, 0.3);
        }

        .float-mic-top {
            top: 10%; left: 12%; width: 44px; height: 44px; color: #7CA1FF; font-size: 16px;
        }
        .float-ai-top {
            top: 12%; right: 14%; width: 40px; height: 40px; color: #7CA1FF; font-weight: bold; font-size: 11px;
        }
        .float-wave-left {
            bottom: 22%; left: 14%; width: 42px; height: 42px; color: #7CA1FF; font-size: 14px;
        }
        .float-bot-right {
            bottom: 18%; right: 12%; width: 56px; height: 56px; background: none; border: none; box-shadow: none;
            font-size: 46px; /* Rendered as emoji style layout */
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Main 3D Microphone Centerpiece */
        .mic-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 220px;
            height: 220px;
        }

        /* Glowing background waves behind microphone */
        .bg-waves {
            position: absolute;
            width: 130%;
            height: 80px;
            background: radial-gradient(ellipse, rgba(26, 92, 255, 0.15) 0%, rgba(26, 92, 255, 0) 70%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            pointer-events: none;
        }

        .bg-wave-bar {
            width: 3px;
            background: linear-gradient(180deg, #5185FF 0%, #1A5CFF 100%);
            border-radius: 10px;
            animation: soundWave 1.2s ease-in-out infinite alternate;
        }

        /* Creating variable heights for realistic wave */
        .bg-wave-bar:nth-child(odd) { height: 40px; animation-duration: 0.8s; }
        .bg-wave-bar:nth-child(3n) { height: 65px; animation-duration: 1.4s; }
        .bg-wave-bar:nth-child(5n) { height: 25px; animation-duration: 1.1s; }

        /* Rendered high-fidelity 3D Microphone Styling */
        .mic-3d {
            width: 90px;
            height: 180px;
            background: linear-gradient(135deg, #2A6FFF 0%, #0043E0 100%);
            border-radius: 45px;
            position: relative;
            box-shadow: 
                inset 0 4px 12px rgba(255, 255, 255, 0.4),
                inset 0 -8px 16px rgba(0, 0, 0, 0.4),
                0 20px 40px rgba(12, 53, 154, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0 25px;
        }

        /* Mesh Texture Grid on Top */
        .mic-mesh {
            width: 76px;
            height: 85px;
            background: 
                radial-gradient(circle, rgba(0,0,0,0.15) 20%, transparent 20%),
                linear-gradient(135deg, #1E56D6 0%, #0036B3 100%);
            background-size: 4px 4px, 100% 100%;
            border-radius: 38px 38px 10px 10px;
            box-shadow: inset 0 4px 10px rgba(255, 255, 255, 0.3), inset 0 -4px 8px rgba(0, 0, 0, 0.3);
            border-bottom: 3px solid #002D96;
        }

        .mic-badge {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFF;
            font-size: 12px;
            box-shadow: inset 0 1px 4px rgba(255,255,255,0.4);
            margin-top: 15px;
        }

        /* Stand base */
        .mic-stand-neck {
            position: absolute;
            bottom: -25px;
            width: 14px;
            height: 35px;
            background: linear-gradient(90deg, #1A5CFF 0%, #003CD1 100%);
            box-shadow: inset 2px 0 5px rgba(255,255,255,0.3);
            z-index: -1;
        }
        .mic-stand-base {
            position: absolute;
            bottom: -34px;
            width: 76px;
            height: 14px;
            background: linear-gradient(180deg, #2A6FFF 0%, #003CD1 100%);
            border-radius: 20px 20px 6px 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.4);
            z-index: -1;
        }

        /* Bottom HUD Details */
        .hud-container {
            padding: 0 24px 30px;
            text-align: center;
        }

        .recording-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .timer {
            font-size: 46px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        /* Sub-waveform element */
        .sub-wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 35px;
            margin-bottom: 12px;
        }
        .wave-dot {
            width: 3px;
            height: 3px;
            background-color: #A9C2E6;
            border-radius: 50%;
        }
        .wave-bar {
            width: 3px;
            background-color: #6C97FF;
            border-radius: 3px;
            animation: soundWave 1s ease-in-out infinite alternate;
        }
        /* Soundwave micro-variance mapping */
        .wave-bar:nth-child(2n) { height: 12px; background-color: #4B7BFA; }
        .wave-bar:nth-child(3n) { height: 24px; background-color: #245FFF; }
        .wave-bar:nth-child(4n) { height: 16px; background-color: #4B7BFA; }
        
        @keyframes soundWave {
            0% { transform: scaleY(0.6); }
            100% { transform: scaleY(1.2); }
        }

        .status-msg {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 35px;
        }

        /* 3D Action Buttons Row Container */
        .actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            margin-bottom: 10px;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-wrapper span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Core 3D Button Setup */
        .btn-3d {
            width: 84px;
            height: 84px;
            border-radius: 26px;
            border: none;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        /* 1. Pause Button Styles */
        .btn-pause {
            background: var(--btn-pause-bg);
            box-shadow: 
                0 1px 0px var(--btn-pause-shadow),
                0 2px 0px var(--btn-pause-shadow),
                0 3px 0px var(--btn-pause-shadow),
                0 4px 0px var(--btn-pause-shadow),
                0 5px 0px var(--btn-pause-shadow),
                0 6px 0px var(--btn-pause-shadow),
                0 7px 0px var(--btn-pause-shadow),
                0 8px 15px rgba(255, 179, 0, 0.4);
            color: white;
        }
        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 1px 0px var(--btn-pause-shadow),
                0 2px 0px var(--btn-pause-shadow),
                0 3px 0px var(--btn-pause-shadow),
                0 4px 0px var(--btn-pause-shadow),
                0 5px 0px var(--btn-pause-shadow),
                0 6px 0px var(--btn-pause-shadow),
                0 7px 0px var(--btn-pause-shadow),
                0 8px 0px var(--btn-pause-shadow),
                0 9px 0px var(--btn-pause-shadow),
                0 12px 20px rgba(255, 179, 0, 0.5);
        }
        .btn-pause:active {
            transform: translateY(6px);
            box-shadow: 
                0 1px 0px var(--btn-pause-shadow),
                0 2px 0px var(--btn-pause-shadow),
                0 4px 10px rgba(255, 179, 0, 0.4);
        }

        /* 2. Stop Button Styles */
        .btn-stop {
            background: var(--btn-stop-bg);
            box-shadow: 
                0 1px 0px var(--btn-stop-shadow),
                0 2px 0px var(--btn-stop-shadow),
                0 3px 0px var(--btn-stop-shadow),
                0 4px 0px var(--btn-stop-shadow),
                0 5px 0px var(--btn-stop-shadow),
                0 6px 0px var(--btn-stop-shadow),
                0 7px 0px var(--btn-stop-shadow),
                0 8px 15px rgba(255, 59, 48, 0.4);
            color: white;
        }
        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 1px 0px var(--btn-stop-shadow),
                0 2px 0px var(--btn-stop-shadow),
                0 3px 0px var(--btn-stop-shadow),
                0 4px 0px var(--btn-stop-shadow),
                0 5px 0px var(--btn-stop-shadow),
                0 6px 0px var(--btn-stop-shadow),
                0 7px 0px var(--btn-stop-shadow),
                0 8px 0px var(--btn-stop-shadow),
                0 9px 0px var(--btn-stop-shadow),
                0 12px 20px rgba(255, 59, 48, 0.5);
        }
        .btn-stop:active {
            transform: translateY(6px);
            box-shadow: 
                0 1px 0px var(--btn-stop-shadow),
                0 2px 0px var(--btn-stop-shadow),
                0 4px 10px rgba(255, 59, 48, 0.4);
        }

        /* 3. Cancel Button Styles */
        .btn-cancel {
            background: var(--btn-cancel-bg);
            box-shadow: 
                0 1px 0px var(--btn-cancel-shadow),
                0 2px 0px var(--btn-cancel-shadow),
                0 3px 0px var(--btn-cancel-shadow),
                0 4px 0px var(--btn-cancel-shadow),
                0 5px 0px var(--btn-cancel-shadow),
                0 6px 0px var(--btn-cancel-shadow),
                0 7px 0px var(--btn-cancel-shadow),
                0 8px 15px rgba(165, 185, 214, 0.25);
            color: var(--text-dark);
        }
        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 1px 0px var(--btn-cancel-shadow),
                0 2px 0px var(--btn-cancel-shadow),
                0 3px 0px var(--btn-cancel-shadow),
                0 4px 0px var(--btn-cancel-shadow),
                0 5px 0px var(--btn-cancel-shadow),
                0 6px 0px var(--btn-cancel-shadow),
                0 7px 0px var(--btn-cancel-shadow),
                0 8px 0px var(--btn-cancel-shadow),
                0 9px 0px var(--btn-cancel-shadow),
                0 12px 20px rgba(165, 185, 214, 0.4);
        }
        .btn-cancel:active {
            transform: translateY(6px);
            box-shadow: 
                0 1px 0px var(--btn-cancel-shadow),
                0 2px 0px var(--btn-cancel-shadow),
                0 4px 10px rgba(165, 185, 214, 0.2);
        }

        /* Screen Bottom Indicator Bar */
        .home-indicator {
            width: 140px;
            height: 5px;
            background-color: #A0B2CE;
            border-radius: 10px;
            margin: 12px auto 8px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <i class="fa-solidxl fa-signal"></i>
                <i class="fa-solid fa-wifi" style="margin: 0 2px;"></i>
                <span style="font-size:12px; font-weight:700;">100%</span>
            </div>

        <div class="header">

            <div class="mic-wrapper">

            <div class="home-indicator"></div>
        </div>
    </div>

    <!-- Script to handle button touches/clicks -->
    <script>
        document.querySelector('.btn-pause').addEventListener('click', function() {
            alert('Recording paused');
        });

        document.querySelector('.btn-stop').addEventListener('click', function() {
